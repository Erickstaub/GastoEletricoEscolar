<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Gestão de Salas</title>
    <style>
        :root {
            --brand-pink: #FF0040;
            --dark-bg: #343A4B;
            --body-bg: #f4f7f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh; /* min-height para permitir scroll se o form for longo */
            padding: 20px 0;
        }

        .register-card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .register-card h2 {
            color: var(--dark-bg);
            margin: 0 0 10px 0;
            font-size: 2rem;
            text-align: center;
        }

        .register-card p.subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
            text-align: center;
        }

        /* Ajuste do Form Django as_p */
        form p {
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;
        }

        label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
            font-size: 0.9rem;
        }

        input {
            padding: 12px 16px;
            border: 2px solid #edeff2;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            background-color: #fcfcfc;
        }

        input:focus {
            border-color: var(--brand-pink);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 0, 64, 0.1);
        }

        /* Estilo para as dicas de senha do Django (helptext) */
        .helptext {
            font-size: 0.75rem;
            color: #999;
            margin-top: 5px;
            line-height: 1.3;
        }

        ul.errorlist {
            padding: 0;
            margin: 0 0 15px 0;
            list-style: none;
            color: var(--brand-pink);
            font-size: 0.85rem;
            font-weight: bold;
        }

        .btn-register {
            background-color: var(--brand-pink);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 10px;
        }

        .btn-register:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
        }

        .footer-links a {
            color: var(--brand-pink);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Criar Conta</h2>
        <p class="subtitle">Cadastre-se para gerenciar o consumo de energia.</p>

        <form method="post">
            {% csrf_token %}
            
            {{ form.as_p }}

            <button type="submit" class="btn-register">Finalizar Cadastro</button>
        </form>

        <div class="footer-links">
            Já tem uma conta? <a href="{% url 'login' %}">Faça login</a>
            <br><br>
           
        </div>
    </div>

</body>
</html>
